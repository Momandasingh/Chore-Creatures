<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chore Creatures!</title>
<style>

  body { font-family:'Nunito',sans-serif; min-height:100vh; background:var(--bg,linear-gradient(135deg,#667eea 0%,#764ba2 100%)); overflow-x:hidden; transition:background 0.6s ease; }

  .pet-card { background:rgba(255,255,255,0.93); border-radius:20px; box-shadow:0 8px 28px rgba(0,0,0,0.12); padding:16px 12px; text-align:center; position:relative; overflow:hidden; transition:box-shadow 0.4s; }

  .pet-card.winner { box-shadow:0 0 0 3px #f6d365, 0 8px 28px rgba(0,0,0,0.12); }
  .edit-toggle { position:absolute; top:10px; right:10px; background:rgba(109,40,217,0.1); border:none; border-radius:8px; padding:4px 10px; cursor:pointer; font-size:0.68rem; font-weight:700; color:#6d28d9; font-family:'Nunito',sans-serif; }
  .coin-badge { position:absolute; top:10px; left:10px; background:linear-gradient(135deg,#f6d365,#fda085); border-radius:20px; padding:3px 10px; font-size:0.72rem; font-weight:800; color:#7c2d12; }
  .pet-outfit { display:grid; grid-template-columns:2.2rem 4rem 2.2rem; grid-template-rows:2.2rem 4rem 2.2rem; gap:2px; align-items:center; justify-items:center; margin:6px auto 4px; width:fit-content; }
  .outfit-top    { grid-area:1/2; }
  .outfit-left   { grid-area:2/1; }
  .outfit-pet    { grid-area:2/2; }
  .outfit-right  { grid-area:2/3; }
  .outfit-bottom { grid-area:3/2; }
  .outfit-item   { font-size:1.5rem; line-height:1; }
  .outfit-empty  { font-size:1rem; opacity:0.15; }
  .pet-emoji { font-size:3.6rem; line-height:1; animation:petBounce 2s ease-in-out infinite; display:block; user-select:none; }
  .pet-emoji.celebrating { animation:petCelebrate 0.5s ease-in-out 3; }

  @keyframes petCelebrate { 0%{transform:rotate(0) scale(1)} 25%{transform:rotate(-15deg) scale(1.2)} 50%{transform:rotate(15deg) scale(1.2)} 75%{transform:rotate(-10deg) scale(1.1)} 100%{transform:rotate(0) scale(1)} }

  .pet-mood-text { font-size:0.75rem; color:#7c3aed; font-weight:700; margin-top:4px; }

  .hbar-fill.max  { background:linear-gradient(90deg,#f093fb,#f5576c,#fda085); }
  .all-done-badge { background:linear-gradient(135deg,#f6d365,#fda085); border-radius:10px; padding:5px 10px; margin-top:6px; font-family:'Fredoka One',cursive; font-size:0.82rem; color:#fff; animation:popIn 0.3s ease-out; display:inline-block; }
  @keyframes popIn { 0%{transform:scale(0.8);opacity:0} 100%{transform:scale(1);opacity:1} }
  .shop-card-btn { margin-top:10px; background:linear-gradient(135deg,#7c3aed,#a78bfa); color:#fff; border:none; border-radius:12px; padding:7px 18px; font-family:'Nunito',sans-serif; font-weight:800; font-size:0.82rem; cursor:pointer; box-shadow:0 3px 10px rgba(124,58,237,0.35); width:100%; transition:transform 0.15s; }

  .edit-panel { margin-top:8px; }
  .pet-name-input { font-family:'Fredoka One',cursive; font-size:0.95rem; text-align:center; border:2px dashed #c4b5fd; border-radius:8px; padding:3px 8px; color:#5b21b6; background:#f5f3ff; outline:none; width:120px; }
  .pet-picker { display:flex; gap:5px; justify-content:center; flex-wrap:wrap; margin:7px 0; }
  .pet-option { font-size:1.5rem; cursor:pointer; padding:4px; border-radius:9px; border:2.5px solid transparent; transition:all 0.18s; background:#f5f3ff; }

  .pet-option.selected { border-color:#7c3aed; background:#ede9fe; transform:scale(1.1); }
  .done-btn { margin-top:6px; background:#7c3aed; color:#fff; border:none; border-radius:8px; padding:5px 16px; font-family:'Nunito',sans-serif; font-weight:700; cursor:pointer; font-size:0.8rem; }
  .period-section { margin-bottom:10px; }
  .period-header { display:flex; align-items:center; gap:5px; font-family:'Fredoka One',cursive; font-size:0.78rem; color:rgba(255,255,255,0.92); margin-bottom:5px; padding:4px 8px; border-radius:9px; }

  .period-header.afternoon { background:rgba(79,172,254,0.22);  }
  .period-header.evening   { background:rgba(160,119,251,0.28); }

  .task-card.done { opacity:0.5; border-color:#bbf7d0; }

  .task-info  { flex:1; min-width:0; }
  .task-name  { font-weight:700; font-size:0.75rem; color:#1f2937; line-height:1.2; }
  .task-pts   { font-size:0.64rem; color:#7c3aed; font-weight:600; }
  .task-coin  { color:#f59e0b; font-weight:700; }

  .task-card.done .task-check { background:#22c55e; border-color:#22c55e; color:#fff; }
  /* SHOP MODAL */

  .shop-title  { font-family:'Fredoka One',cursive; font-size:1.3rem; color:#fff; flex:1; }

  .shop-close  { background:rgba(255,255,255,0.2); border:none; color:#fff; border-radius:10px; padding:6px 12px; cursor:pointer; font-size:1rem; font-weight:700; }
  .shop-tabs   { display:flex; gap:6px; background:#f3f4f6; padding:8px 12px; flex-shrink:0; overflow-x:auto; }
  .shop-tab    { border:none; border-radius:10px; padding:7px 14px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.82rem; background:transparent; color:#6b7280; transition:all 0.18s; white-space:nowrap; }

  .shop-item.equipped { border-color:#7c3aed; background:#ede9fe; box-shadow:0 0 0 2px #c4b5fd; }
  .shop-item-emoji { font-size:2.4rem; display:block; margin-bottom:5px; }
  .shop-item-name  { font-weight:700; font-size:0.75rem; color:#374151; margin-bottom:4px; line-height:1.2; }
  .shop-item-cost  { font-size:0.72rem; color:#f59e0b; font-weight:800; }
  .shop-item-btn   { margin-top:8px; width:100%; border:none; border-radius:8px; padding:6px; font-family:'Nunito',sans-serif; font-weight:700; font-size:0.72rem; cursor:pointer; transition:all 0.15s; }
  .shop-item-btn.buy    { background:linear-gradient(135deg,#7c3aed,#a78bfa); color:#fff; }
  .shop-item-btn.buy:disabled { background:#e5e7eb; color:#9ca3af; cursor:not-allowed; }
  .shop-item-btn.equip   { background:#22c55e; color:#fff; }
  .shop-item-btn.unequip { background:#e9d5ff; color:#7c3aed; }
  .shop-equipped-label   { font-size:0.65rem; color:#7c3aed; font-weight:800; display:block; margin-top:2px; }
  .bonus-toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#f6d365,#fda085); color:#7c2d12; border-radius:20px; padding:12px 24px; font-family:'Fredoka One',cursive; font-size:1.1rem; z-index:600; box-shadow:0 8px 24px rgba(253,160,133,0.5); animation:toastPop 0.4s ease, toastFade 0.4s ease 2.4s forwards; white-space:nowrap; }

</style>

  {id:'purple',bg:'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',emoji:'💜'},
  {id:'ocean', bg:'linear-gradient(135deg,#1a6eb5 0%,#0ea5e9 100%)',emoji:'💙'},
  {id:'forest',bg:'linear-gradient(135deg,#166534 0%,#16a34a 100%)',emoji:'💚'},
  {id:'sunset',bg:'linear-gradient(135deg,#c2410c 0%,#f97316 100%)',emoji:'🧡'},
  {id:'candy', bg:'linear-gradient(135deg,#db2777 0%,#f472b6 100%)',emoji:'💗'},
  {id:'night', bg:'linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%)',emoji:'🌙'},
  {id:'berry', bg:'linear-gradient(135deg,#7e22ce 0%,#be185d 100%)',emoji:'🍇'},
  {id:'mint',  bg:'linear-gradient(135deg,#0d9488 0%,#6ee7b7 100%)',emoji:'🌿'},
];
const DEFAULT_TASKS = [
  {id:1, name:'Brush teeth',        icon:'🪥',points:10,period:'morning'},
  {id:2, name:'Get dressed',        icon:'👕',points:10,period:'morning'},
  {id:3, name:'Make bed',           icon:'🛏️',points:10,period:'morning'},
  {id:4, name:'Eat breakfast',      icon:'🍽️',points:10,period:'morning'},
  {id:5, name:'Shoes & backpack',   icon:'🎒',points:10,period:'morning'},
  {id:6, name:'Homework / reading', icon:'📚',points:15,period:'afternoon'},
  {id:7, name:'Practice piano',     icon:'🎵',points:15,period:'afternoon'},
  {id:8, name:'Clean up toys',      icon:'🧹',points:10,period:'afternoon'},
  {id:9, name:'Brush teeth',        icon:'🪥',points:10,period:'evening'},
  {id:10,name:'Floss teeth',        icon:'🦷',points:10,period:'evening'},
];

let state = loadData('chorecreatures_v1',{
  kids:[
    {id:'k0',name:'Player 1',pet:'🐱',petName:'Whiskers',completed:[],coins:0,owned:[],equipped:[],bonusEarned:false},
    {id:'k1',name:'Player 2',pet:'🐶',petName:'Buddy',   completed:[],coins:0,owned:[],equipped:[],bonusEarned:false},
  ],
  tasks:null,theme:'purple',nextKid:2,
});
state.kids.forEach(k=>{
  if(k.coins===undefined)k.coins=0;
  if(k.owned===undefined)k.owned=[];
  if(k.equipped===undefined)k.equipped=[];
  if(k.bonusEarned===undefined)k.bonusEarned=false;
});

function loadData(key,fb){try{const d=localStorage.getItem(key);return d?JSON.parse(d):fb;}catch{return fb;}}
function save(){try{localStorage.setItem('chorecreatures_v1',JSON.stringify(state));}catch{}}
function getTasks(){return state.tasks||DEFAULT_TASKS;}
function getKid(id){return state.kids.find(k=>k.id===id);}
function happiness(kid){const tasks=getTasks();if(!tasks.length)return 0;const tot=tasks.reduce((s,t)=>s+t.points,0),earn=tasks.filter(t=>kid.completed.includes(t.id)).reduce((s,t)=>s+t.points,0);return Math.round((earn/tot)*100);}
function petMood(h){if(h===100)return{face:'😍',text:'ALL DONE! 🎉',cls:'celebrating'};if(h>=75)return{face:'😊',text:'Feeling great!',cls:''};if(h>=50)return{face:'😃',text:'Getting happier!',cls:''};if(h>=25)return{face:'😐',text:'Needs more love…',cls:''};return{face:'😢',text:'Help me!',cls:''};}
function applyTheme(id){const t=THEMES.find(t=>t.id===id)||THEMES[0];document.body.style.setProperty('--bg',t.bg);}
function slotItem(kid,slot){return(kid.equipped||[]).map(eid=>SHOP_ITEMS.find(i=>i.id===eid)).find(i=>i&&i.slot===slot);}
function kidAccent(i){return['#fda085','#a78bfa','#38f9d7','#f5576c'][i%4];}
function catEmoji(c){return{Hats:'🎩',Accessories:'🎀',Toys:'🧸',Treats:'🍦'}[c]||'';}

let editingKid=null,showEmojiTray=false,newTaskName='',newTaskEmoji='⭐',newTaskPeriod='morning',dragId=null,shopKidId=null,shopCat='Hats';

function render(){
  applyTheme(state.theme);
  const tasks=getTasks(),maxH=Math.max(...state.kids.map(k=>happiness(k)));
  const scoreHtml=state.kids.map((k,i)=>{const h=happiness(k),lead=h===maxH&&h>0;return`<div class="score-chip ${lead?'leading':''}">${k.pet} ${k.name}: ${h}%</div>${i<state.kids.length-1?'<div class="vs-badge">⚔️</div>':''}`}).join('');
  document.getElementById('app').innerHTML=`
    <div class="header"><h1>🐾 Chore Creatures! 🐾</h1><div class="sub">Complete your chores, keep your creature happy, beat your siblings!</div></div>
    <div class="scoreboard">${scoreHtml}</div>
    <div class="arena">${state.kids.map((k,i)=>petCard(k,i)).join('')}</div>
    <div class="tasks-grid">${state.kids.map((k,i)=>taskCol(k,i,tasks)).join('')}</div>
    ${parentZone(tasks)}
    <button class="reset-btn" onclick="resetDay()">🔄 Reset for New Day</button>
    ${shopKidId?shopModal():''}`;
}

function petCard(kid,idx){
  const h=happiness(kid),mood=petMood(h),bar=h===100?'max':h>=60?'high':'',isEd=editingKid===kid.id,color=KID_BARS[idx%KID_BARS.length];
  const sTop=slotItem(kid,'top'),sLeft=slotItem(kid,'left'),sRight=slotItem(kid,'right'),sBot=slotItem(kid,'bottom');
  const outfit=`<div class="pet-outfit">
    <div class="outfit-top">${sTop?`<span class="outfit-item">${sTop.emoji}</span>`:`<span class="outfit-empty">🔘</span>`}</div>
    <div class="outfit-left">${sLeft?`<span class="outfit-item">${sLeft.emoji}</span>`:`<span class="outfit-empty">🔘</span>`}</div>
    <div class="outfit-pet"><span class="pet-emoji ${mood.cls}" id="pet_${kid.id}">${kid.pet}</span></div>
    <div class="outfit-right">${sRight?`<span class="outfit-item">${sRight.emoji}</span>`:`<span class="outfit-empty">🔘</span>`}</div>
    <div class="outfit-bottom">${sBot?`<span class="outfit-item">${sBot.emoji}</span>`:`<span class="outfit-empty">🔘</span>`}</div>
  </div>`;
  return`<div class="pet-card ${h===100?'winner':''}" style="--kid-bar:${color}">
    <div class="coin-badge">🪙 ${kid.coins||0}</div>
    <button class="edit-toggle" onclick="toggleEdit('${kid.id}')">✏️ Edit</button>
    ${isEd?`<div class="edit-panel" style="margin-top:30px">
      <div style="font-size:0.72rem;color:#7c3aed;font-weight:700;margin-bottom:5px">Pet name:</div>
      <input class="pet-name-input" id="petNameIn_${kid.id}" value="${kid.petName}" onkeydown="if(event.key==='Enter')savePetName('${kid.id}')"/>
      <div style="margin:8px 0 4px;font-size:0.72rem;color:#7c3aed;font-weight:700">Choose animal:</div>
      <div class="pet-picker">${PET_OPTIONS.map(p=>`<span class="pet-option ${kid.pet===p?'selected':''}" onclick="pickPet('${kid.id}','${p}')">${p}</span>`).join('')}</div>
      <button class="done-btn" onclick="savePetName('${kid.id}')">Done ✓</button>
    </div>`:`
    ${outfit}
    <div class="pet-name-disp">${kid.petName}</div>
    <div class="kid-name-disp">${kid.name}'s creature</div>
    <div class="pet-mood-text">${mood.face} ${mood.text}</div>
    <div class="hbar-wrap"><div class="hbar-label"><span>Happiness</span><span>${h}%</span></div><div class="hbar-bg"><div class="hbar-fill ${bar}" style="width:${h}%"></div></div></div>
    ${h===100?'<div class="all-done-badge">🏆 All Done!</div>':''}
    <button class="shop-card-btn" onclick="openShop('${kid.id}')">🛍️ Visit Shop</button>`}
  </div>`;
}

function taskCol(kid,idx,tasks){
  const rows=PERIODS.map(period=>{
    const pts=tasks.filter(t=>t.period===period);if(!pts.length)return'';
    const m=PERIOD_META[period];
    return`<div class="period-section"><div class="period-header ${m.cls}">${m.label}</div>
    ${pts.map(t=>{const done=kid.completed.includes(t.id);return`<div class="task-card ${done?'done':''}" onclick="toggleTask('${kid.id}',${t.id},event)">
      <div class="task-icon">${t.icon}</div>
      <div class="task-info"><div class="task-name">${t.name}</div><div class="task-pts">+${t.points} pts <span class="task-coin">· 🪙+${t.points}</span></div></div>
      <div class="task-check">${done?'✓':''}</div>
    </div>`;}).join('')}</div>`;
  }).join('');
  return`<div><div style="font-family:'Fredoka One',cursive;font-size:0.9rem;color:#fff;margin-bottom:8px">${kid.pet} ${kid.name}</div>${rows}</div>`;
}

function shopModal(){
  const kid=getKid(shopKidId);if(!kid)return'';
  const items=SHOP_ITEMS.filter(i=>i.cat===shopCat);
  return`<div class="shop-overlay" onclick="closeShopIfOutside(event)">
    <div class="shop-modal" id="shopModalInner">
      <div class="shop-header">
        <div class="shop-title">🛍️ ${kid.petName}'s Shop</div>
        <div class="shop-coins">🪙 ${kid.coins||0}</div>
        <button class="shop-close" onclick="closeShop()">✕</button>
      </div>
      <div class="shop-tabs">${SHOP_CATS.map(c=>`<button class="shop-tab ${shopCat===c?'active':''}" onclick="setShopCat('${c}')">${catEmoji(c)} ${c}</button>`).join('')}</div>
      <div class="shop-body">
        <div class="shop-grid">${items.map(item=>{
          const owned=(kid.owned||[]).includes(item.id),equipped=(kid.equipped||[]).includes(item.id),canAfford=(kid.coins||0)>=item.cost;
          return`<div class="shop-item ${equipped?'equipped':owned?'owned':''}">
            <span class="shop-item-emoji">${item.emoji}</span>
            <div class="shop-item-name">${item.name}</div>
            ${equipped?'<span class="shop-equipped-label">✓ Equipped</span>':''}
            ${!owned?`<div class="shop-item-cost">🪙 ${item.cost}</div>`:''}
            ${owned
              ?`<button class="shop-item-btn ${equipped?'unequip':'equip'}" onclick="equipItem('${shopKidId}','${item.id}')">${equipped?'Unequip':'Equip'}</button>`
              :`<button class="shop-item-btn buy" onclick="buyItem('${shopKidId}','${item.id}')" ${canAfford?'':'disabled'}>${canAfford?'Buy!':'Need 🪙'+item.cost}</button>`}
          </div>`;
        }).join('')}</div>
        ${(kid.owned||[]).length===0?`<p style="text-align:center;color:#9ca3af;font-size:0.82rem;margin-top:16px">Complete chores to earn 🪙 coins, then buy items to dress up ${kid.petName}!</p>`:''}
      </div>
    </div>
  </div>`;
}

function parentZone(tasks){
  return`<details class="parent-zone">
    <summary>👩‍👧‍👦 Parent Settings</summary>
    <div class="theme-section">
      <div class="theme-label">🎨 Background Theme</div>
      <div class="theme-swatches">${THEMES.map(t=>`<div class="theme-swatch ${state.theme===t.id?'active':''}" style="background:${t.bg}" onclick="setTheme('${t.id}')">${state.theme===t.id?'✓':''}</div>`).join('')}</div>
    </div>
    <div class="divider"><hr/><span>Children</span><hr/></div>
    <div class="kid-settings-grid">
      ${state.kids.map((k,i)=>`<div class="kid-settings-card" style="border-top:3px solid ${kidAccent(i)}">
        <div class="kid-settings-label"><span>${k.pet} ${k.name}</span>${state.kids.length>1?`<button class="p-btn sm danger" onclick="removeKid('${k.id}')">Remove</button>`:''}</div>
        <div style="display:flex;gap:6px;margin-bottom:6px"><input class="p-input" id="kidName_${k.id}" value="${k.name}" placeholder="Name…"/><button class="p-btn sm" onclick="saveKidName('${k.id}')">Save</button></div>
        <div style="color:rgba(255,255,255,0.6);font-size:0.72rem">🪙 ${k.coins||0} coins · ${(k.owned||[]).length} items owned</div>
      </div>`).join('')}
      ${state.kids.length<4?`<div class="kid-settings-card" style="display:flex;align-items:center;justify-content:center;border:2px dashed rgba(255,255,255,0.3);background:transparent"><button class="p-btn add" onclick="addKid()">+ Add Child</button></div>`:`<div style="color:rgba(255,255,255,0.45);font-size:0.78rem;padding:10px">Max 4 children reached.</div>`}
    </div>
    <div class="divider"><hr/><span>Tasks — drag ≡ or use ▲▼ to reorder</span><hr/></div>
    <div id="taskListEditor">${tasks.map((t,i)=>dragRow(t,i,tasks.length)).join('')}</div>
    <div class="divider"><hr/><span>Add a task</span><hr/></div>
    <div class="add-row">
      <button class="emoji-btn" onclick="toggleEmojiTray()">${newTaskEmoji}</button>
      <input class="p-input" id="newTaskIn" placeholder="Task name…" value="${newTaskName}" oninput="newTaskName=this.value" onkeydown="if(event.key==='Enter')addTask()" style="min-width:0;flex:1"/>
      <select class="period-select" onchange="newTaskPeriod=this.value">
        <option value="morning" ${newTaskPeriod==='morning'?'selected':''}>🌅 Morning</option>
        <option value="afternoon" ${newTaskPeriod==='afternoon'?'selected':''}>☀️ Afternoon</option>
        <option value="evening" ${newTaskPeriod==='evening'?'selected':''}>🌙 Evening</option>
      </select>
      <button class="p-btn sm" onclick="addTask()">Add</button>
    </div>
    ${showEmojiTray?`<div class="emoji-tray">${TASK_EMOJIS.map(e=>`<span onclick="pickTaskEmoji('${e}')">${e}</span>`).join('')}</div>`:''}
  </details>`;
}

function dragRow(t,i,total){
  const pm=PERIOD_META[t.period];
  return`<div class="drag-row" id="dr_${t.id}" draggable="true" ondragstart="onDragStart(event,${t.id})" ondragover="onDragOver(event,${t.id})" ondrop="onDrop(event,${t.id})" ondragend="onDragEnd()">
    <span class="drag-handle">≡</span><span style="font-size:1.1rem">${t.icon}</span>
    <div class="drag-row-info"><div style="font-weight:700;line-height:1.2">${t.name}</div><div style="opacity:0.6;font-size:0.7rem">${pm.label} · +${t.points} pts</div></div>
    <select class="period-select" style="font-size:0.7rem;padding:3px 5px" onchange="changeTaskPeriod(${t.id},this.value)" onclick="event.stopPropagation()">
      <option value="morning" ${t.period==='morning'?'selected':''}>🌅</option>
      <option value="afternoon" ${t.period==='afternoon'?'selected':''}>☀️</option>
      <option value="evening" ${t.period==='evening'?'selected':''}>🌙</option>
    </select>
    <div class="order-btns"><button class="order-btn" onclick="moveTask(${t.id},-1)" ${i===0?'disabled':''}>▲</button><button class="order-btn" onclick="moveTask(${t.id},1)" ${i===total-1?'disabled':''}>▼</button></div>
    <button class="rm-btn" onclick="removeTask(${t.id})">✕</button>
  </div>`;
}

function toggleTask(kidId,id,event){
  const kid=getKid(kidId);if(!kid)return;
  const task=getTasks().find(t=>t.id===id),wasDone=kid.completed.includes(id);
  if(wasDone){kid.completed=kid.completed.filter(x=>x!==id);kid.coins=Math.max(0,(kid.coins||0)-(task?task.points:0));}
  else{
    kid.completed.push(id);kid.coins=(kid.coins||0)+(task?task.points:0);
    spawnSparkle(event.clientX,event.clientY);showCoinPop(event.clientX,event.clientY,task?task.points:0);
    if(happiness(kid)===100&&!kid.bonusEarned){kid.coins+=50;kid.bonusEarned=true;setTimeout(launchConfetti,300);setTimeout(()=>showBonusToast(kid.name),400);}
  }
  save();render();
  if(!wasDone){const el=document.getElementById('pet_'+kidId);if(el){el.classList.add('celebrating');setTimeout(()=>el.classList.remove('celebrating'),1500);}}
}

function openShop(kidId){shopKidId=kidId;shopCat='Hats';render();}
function closeShop(){shopKidId=null;render();}
function closeShopIfOutside(e){if(e.target===e.currentTarget)closeShop();}
function setShopCat(cat){shopCat=cat;render();}

function buyItem(kidId,itemId){
  const kid=getKid(kidId),item=SHOP_ITEMS.find(i=>i.id===itemId);
  if(!kid||!item||(kid.coins||0)<item.cost||(kid.owned||[]).includes(itemId))return;
  kid.coins=(kid.coins||0)-item.cost;kid.owned=[...(kid.owned||[]),itemId];
  kid.equipped=[...(kid.equipped||[]).filter(eid=>{const ei=SHOP_ITEMS.find(i=>i.id===eid);return ei&&ei.slot!==item.slot;}),itemId];
  save();render();
}

function equipItem(kidId,itemId){
  const kid=getKid(kidId),item=SHOP_ITEMS.find(i=>i.id===itemId);
  if(!kid||!item||!(kid.owned||[]).includes(itemId))return;
  const eq=kid.equipped||[];
  if(eq.includes(itemId)){kid.equipped=eq.filter(x=>x!==itemId);}
  else{kid.equipped=[...eq.filter(eid=>{const ei=SHOP_ITEMS.find(i=>i.id===eid);return ei&&ei.slot!==item.slot;}),itemId];}
  save();render();
}

function toggleEdit(kidId){editingKid=editingKid===kidId?null:kidId;render();if(editingKid){const inp=document.getElementById('petNameIn_'+kidId);if(inp)inp.focus();}}
function savePetName(kidId){const inp=document.getElementById('petNameIn_'+kidId),kid=getKid(kidId);if(inp&&inp.value.trim()&&kid)kid.petName=inp.value.trim();editingKid=null;save();render();}
function pickPet(kidId,e){const kid=getKid(kidId);if(kid)kid.pet=e;save();render();}
function saveKidName(kidId){const inp=document.getElementById('kidName_'+kidId),kid=getKid(kidId);if(inp&&inp.value.trim()&&kid)kid.name=inp.value.trim();save();render();}
function setTheme(id){state.theme=id;save();render();}
function addKid(){if(state.kids.length>=4)return;const pets=['🐱','🐶','🐰','🐼','🦊','🐸','🦄','🐨'],used=state.kids.map(k=>k.pet),pet=pets.find(p=>!used.includes(p))||'🌟',names=['Fluffy','Sparky','Cotton','Panda'],n=state.nextKid||state.kids.length;state.kids.push({id:'k'+n,name:'Player '+(n+1),pet,petName:names[n%names.length],completed:[],coins:0,owned:[],equipped:[],bonusEarned:false});state.nextKid=(n+1);save();render();}
function removeKid(kidId){if(state.kids.length<=1)return;state.kids=state.kids.filter(k=>k.id!==kidId);save();render();}
function addTask(){const name=newTaskName.trim();if(!name)return;const tasks=getTasks(),maxId=tasks.reduce((m,t)=>Math.max(m,t.id),0);state.tasks=[...tasks,{id:maxId+1,name,icon:newTaskEmoji,points:10,period:newTaskPeriod}];newTaskName='';newTaskEmoji='⭐';showEmojiTray=false;save();render();}
function removeTask(id){state.tasks=getTasks().filter(t=>t.id!==id);state.kids.forEach(k=>{k.completed=k.completed.filter(x=>x!==id);});save();render();}
function changeTaskPeriod(id,p){state.tasks=getTasks().map(t=>t.id===id?{...t,period:p}:t);save();render();}
function moveTask(id,dir){const tasks=[...getTasks()],idx=tasks.findIndex(t=>t.id===id),swap=idx+dir;if(swap<0||swap>=tasks.length)return;[tasks[idx],tasks[swap]]=[tasks[swap],tasks[idx]];state.tasks=tasks;save();render();}
function toggleEmojiTray(){showEmojiTray=!showEmojiTray;render();}
function pickTaskEmoji(e){newTaskEmoji=e;showEmojiTray=false;render();}
function resetDay(){state.kids.forEach(k=>{k.completed=[];k.bonusEarned=false;});save();render();}

function onDragStart(e,id){dragId=id;e.dataTransfer.effectAllowed='move';setTimeout(()=>{const el=document.getElementById('dr_'+id);if(el)el.classList.add('dragging');},0);}
function onDragOver(e,id){e.preventDefault();e.dataTransfer.dropEffect='move';document.querySelectorAll('.drag-row').forEach(r=>r.classList.remove('drag-over'));const el=document.getElementById('dr_'+id);if(el&&id!==dragId)el.classList.add('drag-over');}
function onDrop(e,tid){e.preventDefault();if(dragId===null||dragId===tid)return;const tasks=[...getTasks()],fi=tasks.findIndex(t=>t.id===dragId),ti=tasks.findIndex(t=>t.id===tid);if(fi===-1||ti===-1)return;const [m]=tasks.splice(fi,1);tasks.splice(ti,0,m);state.tasks=tasks;save();render();}
function onDragEnd(){dragId=null;document.querySelectorAll('.drag-row').forEach(r=>{r.classList.remove('drag-over');r.classList.remove('dragging');});}

function spawnSparkle(x,y){['⭐','✨','💫','🌟','💖'].sort(()=>Math.random()-0.5).slice(0,3).forEach(e=>{const el=document.createElement('div');el.className='sparkle';el.textContent=e;el.style.left=(x+(Math.random()-0.5)*60)+'px';el.style.top=(y+(Math.random()-0.5)*60)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),700);});}
function showCoinPop(x,y,amt){const el=document.createElement('div');el.className='sparkle';el.textContent='🪙+'+amt;el.style.cssText=`left:${x}px;top:${y-20}px;font-size:1rem;font-weight:800;color:#f59e0b`;document.body.appendChild(el);setTimeout(()=>el.remove(),700);}
function showBonusToast(name){const el=document.createElement('div');el.className='bonus-toast';el.textContent='🎉 '+name+' earned +50 bonus coins!';document.body.appendChild(el);setTimeout(()=>el.remove(),3000);}
function launchConfetti(){const c=document.createElement('div');c.className='confetti-container';document.body.appendChild(c);const colors=['#f6d365','#fda085','#f093fb','#4facfe','#43e97b','#fa709a','#fee140'];for(let i=0;i<70;i++){const p=document.createElement('div');p.className='confetti-piece';p.style.left=Math.random()*100+'%';p.style.background=colors[Math.floor(Math.random()*colors.length)];p.style.animationDelay=Math.random()*0.8+'s';p.style.borderRadius=Math.random()>0.5?'50%':'2px';p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';c.appendChild(p);}setTimeout(()=>c.remove(),3500);}
function initBubbles(){const container=document.getElementById('bubbles'),colors=['#f6d365','#fda085','#f093fb','#4facfe','#43e97b'];for(let i=0;i<14;i++){const b=document.createElement('div');b.className='bubble';const size=20+Math.random()*70;b.style.cssText=`width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${8+Math.random()*14}s;animation-delay:${Math.random()*12}s`;container.appendChild(b);}}

initBubbles();
render();
</script>
</body>
</html>
